spring.application.name=ms-funcionario
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/bantads?currentSchema=schema_funcionario
spring.datasource.username=${DB_USER:bantads}
spring.datasource.password=${DB_PASS:bantads123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=schema_funcionario
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true
spring.devtools.restart.additional-paths=src/main/resources
