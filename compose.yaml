services:
    postgres:
        image: postgres:17-alpine
        restart: unless-stopped
        ports:
            - ${POSTGRES_PORT}:5432
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: bantads
        volumes:
            - postgres-data:/var/lib/postgresql/data
            - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    mongo:
        image: mongo:7-jammy
        restart: unless-stopped
        ports:
            - ${MONGO_PORT}:27017
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
            MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
        volumes:
            - mongo-data:/data/db
    rabbit:
        image: rabbitmq:4.2-management-alpine
        restart: unless-stopped
        ports:
            - ${RABBIT_AMQP_PORT}:5672
            - ${RABBIT_UI_PORT}:15672
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBIT_DEFAULT_USER}
            RABBITMQ_DEFAULT_PASS: ${RABBIT_DEFAULT_PASS}
        volumes:
            - rabbitmq-data:/var/lib/rabbitmq/
    ms-cliente:
        build: ./ms-cliente
        restart: unless-stopped
        ports:
            - "8081:8081"
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            DB_USER: ${POSTGRES_USER}
            DB_PASS: ${POSTGRES_PASSWORD}
        depends_on:
            - postgres
    ms-conta:
        build: ./ms-conta
        restart: unless-stopped
        ports:
            - "8083:8083"
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            DB_USER: ${POSTGRES_USER}
            DB_PASS: ${POSTGRES_PASSWORD}
            RABBIT_HOST: rabbit
            RABBIT_PORT: 5672
            RABBIT_USER: ${RABBIT_DEFAULT_USER}
            RABBIT_PASS: ${RABBIT_DEFAULT_PASS}
        depends_on:
            - postgres
            - rabbit
    ms-auth:
      build: ./ms-auth
      restart: unless-stopped
      ports:
        - "8082:8080"
      environment:
        SPRING_MONGODB_HOST: mongo
        SPRING_MONGODB_PORT: 27017
        SPRING_MONGODB_DATABASE: bantads
        SPRING_MONGODB_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
        SPRING_MONGODB_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
        SPRING_MONGODB_AUTHENTICATION_DATABASE: admin
        JWT_SECRET: ${JWT_SECRET}
      depends_on:
        - mongo
    ms-funcionario:
      build: ./ms-funcionario
      restart: unless-stopped
      ports:
        - "8083:8080"
      environment:
        DB_HOST: postgres
        DB_PORT: 5432
        DB_USER: ${POSTGRES_USER}
        DB_PASS: ${POSTGRES_PASSWORD}
      depends_on:
        - postgres
      volumes:
        - ./ms-funcionario/src:/app/src

volumes:
    postgres-data:
    mongo-data:
    rabbitmq-data:
