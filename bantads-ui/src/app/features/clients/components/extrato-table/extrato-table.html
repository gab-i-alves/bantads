<div class="activity-section">
    <h3 class="activity-title">Atividade Recente</h3>

    <table class="activity-table">
        <tbody>
            @for (item of items; track $index) {
            <tr>
                <td>
                    <div class="activity-content">
                        <div class="activity-icon">
                            @if (item.isPositive) {
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4ade80"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 5v14" />
                                <path d="m19 12-7 7-7-7" />
                            </svg>
                            } @else {
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f43f5e"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 19V5" />
                                <path d="m5 12 7-7 7 7" />
                            </svg>
                            }
                        </div>
                        <div class="activity-details">
                            <h4>{{ item.label }}</h4>
                            <p>{{ item.sublabel }}</p>
                        </div>
                    </div>
                </td>
                <td>
                    <span class="activity-value" [class.positive]="item.isPositive"
                        [class.negative]="!item.isPositive">{{ item.amount }}</span>
                    <span class="activity-category">{{ item.category }}</span>
                </td>
            </tr>
            } @empty {
            <tr>
                <td colspan="2" style="text-align: center; opacity: 0.4; padding: 24px;">
                    Sem movimentações recentes.
                </td>
            </tr>
            }
        </tbody>
    </table>

    <a routerLink="/client/extrato" class="view-all">Ver Todo o Histórico</a>
</div>
